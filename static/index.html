<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Company Brain — Soil Systems</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: hsl(150, 15%, 6%);
            --bg-surface: hsl(150, 15%, 10%);
            --bg-surface-glass: rgba(15, 27, 21, 0.75);
            --border-glass: rgba(158, 252, 208, 0.12);
            --border-glass-focus: rgba(158, 252, 208, 0.4);
            
            --primary: hsl(158, 82%, 52%);
            --primary-glow: hsla(158, 82%, 52%, 0.35);
            --primary-dark: hsl(150, 70%, 30%);
            
            --secondary: hsl(195, 85%, 60%);
            --secondary-glow: hsla(195, 85%, 60%, 0.25);
            
            --text-main: hsl(150, 10%, 96%);
            --text-muted: hsl(150, 8%, 65%);
            
            --accent-success: hsl(142, 70%, 45%);
            --accent-warning: hsl(38, 92%, 50%);
            
            --font-display: 'Outfit', 'Inter', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 10% 20%, hsla(150, 30%, 15%, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, hsla(195, 30%, 15%, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface);
            border-radius: 4px;
            border: 2px solid var(--bg-base);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        header {
            backdrop-filter: blur(12px);
            background: rgba(10, 20, 15, 0.6);
            border-bottom: 1px solid var(--border-glass);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2.25rem;
            height: 2.25rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            box-shadow: 0 0 15px var(--primary-glow);
            position: relative;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 25%;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background: var(--bg-base);
        }

        .logo-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: 0.5px;
            background: linear-gradient(120deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(158, 252, 208, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            box-shadow: 0 0 10px var(--accent-success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .main-container {
            max-width: 1280px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 968px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--bg-surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(16px);
            transition: var(--transition-smooth);
        }

        .glass-card:hover {
            border-color: rgba(158, 252, 208, 0.2);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
        }

        .card-title i {
            color: var(--primary);
        }

        /* Ask Box Styles */
        .search-area {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            background: rgba(10, 20, 15, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            padding-right: 4rem;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.05rem;
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .search-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            width: 2.75rem;
            height: 2.75rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .search-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .search-btn svg {
            width: 1.25rem;
            height: 1.25rem;
            fill: #000;
        }

        /* Preset Questions */
        .preset-questions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .preset-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .preset-btn {
            background: rgba(158, 252, 208, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 0.8rem 1.2rem;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .preset-btn:hover {
            background: rgba(158, 252, 208, 0.08);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        /* Answer Output Area */
        .answer-container {
            min-height: 180px;
            border-radius: 12px;
            background: rgba(10, 20, 15, 0.3);
            border: 1px solid var(--border-glass);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .answer-placeholder {
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-grow: 1;
            font-size: 0.95rem;
            text-align: center;
            font-style: italic;
        }

        .answer-text {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .sources-area {
            border-top: 1px solid var(--border-glass);
            padding-top: 1rem;
        }

        .sources-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .source-badge {
            background: rgba(195, 240, 255, 0.06);
            border: 1px solid rgba(195, 240, 255, 0.2);
            color: var(--secondary);
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .source-badge:hover {
            background: rgba(195, 240, 255, 0.12);
            border-color: var(--secondary);
        }

        /* Upload Panel & Form */
        .dropzone-container {
            border: 2px dashed var(--border-glass);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            background: rgba(10, 20, 15, 0.2);
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-bottom: 1.5rem;
            position: relative;
        }

        .dropzone-container:hover {
            border-color: var(--primary);
            background: rgba(158, 252, 208, 0.03);
        }

        .dropzone-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .dropzone-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .dropzone-text span {
            color: var(--primary);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-select, .form-input {
            width: 100%;
            background: rgba(10, 20, 15, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: var(--font-body);
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-select:focus, .form-input:focus {
            border-color: var(--primary);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            padding: 0.9rem;
            color: #000;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .action-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        /* Document list & processing status */
        .doc-list {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .doc-item {
            background: rgba(10, 20, 15, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .doc-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .doc-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Tab Switcher */
        .tab-section {
            grid-column: 1 / -1;
            margin-top: 2rem;
        }

        .tab-headers {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 1.5rem;
        }

        .tab-header {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
        }

        .tab-header.active {
            color: var(--primary);
        }

        .tab-header.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Data cards */
        .data-card {
            background: rgba(10, 20, 15, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .data-card-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--primary);
            border-bottom: 1px solid rgba(158, 252, 208, 0.05);
            padding-bottom: 0.5rem;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .data-label {
            color: var(--text-muted);
        }

        .data-value {
            font-weight: 500;
            text-align: right;
        }

        /* Modal/Popup form helper */
        .add-meta-section {
            grid-column: 1 / -1;
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .small-btn {
            background: rgba(158, 252, 208, 0.05);
            border: 1px solid var(--border-glass);
            color: var(--primary);
            font-family: var(--font-display);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .small-btn:hover {
            background: rgba(158, 252, 208, 0.12);
            border-color: var(--primary);
        }

        .hidden-file {
            display: none;
        }

        .spinner {
            border: 3px solid rgba(158, 252, 208, 0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon"></div>
            <div>
                <div class="logo-text">Soil Systems</div>
                <div class="logo-subtitle">The Company Brain</div>
            </div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>6 Layers Active</span>
        </div>
    </header>

    <div class="main-container">
        
        <!-- Left Column: Search & Q&A -->
        <section class="glass-card">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="stroke: var(--primary); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                </svg>
                Ask In Plain English
            </h2>
            
            <div class="search-area">
                <input type="text" id="questionInput" class="search-input" placeholder="Type a question (English, Hindi, Kannada)..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="submitQuestion()">
                    <svg viewBox="0 0 24 24">
                        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
                    </svg>
                </button>
            </div>

            <div class="preset-questions">
                <div class="preset-title">Verify System Questions</div>
                <button class="preset-btn" onclick="askPreset('What advance did we pay for the Coorg resort?')">
                    "What advance did we pay for the Coorg resort?"
                </button>
                <button class="preset-btn" onclick="askPreset('Which lawyer handled this land?')">
                    "Which lawyer handled this land?"
                </button>
                <button class="preset-btn" onclick="askPreset('Show all pepper cultivation SOPs.')">
                    "Show all pepper cultivation SOPs."
                </button>
                <button class="preset-btn" onclick="askPreset('What did Zameer tell us about conversion?')">
                    "What did Zameer tell us about conversion?"
                </button>
                <button class="preset-btn" onclick="askPreset('Which vendors supply drip irrigation?')">
                    "Which vendors supply drip irrigation?"
                </button>
                
                <div class="preset-title" style="margin-top: 1rem;">Phase 5: Live Action Queries</div>
                <button class="preset-btn" style="border-color: rgba(195, 240, 255, 0.15);" onclick="askPreset('How many CRM leads came yesterday?')">
                    "How many CRM leads came yesterday?"
                </button>
                <button class="preset-btn" style="border-color: rgba(195, 240, 255, 0.15);" onclick="askPreset('Which vendors are pending payment?')">
                    "Which vendors are pending payment?"
                </button>
            </div>

            <div class="answer-container" id="answerContainer">
                <div class="answer-placeholder" id="placeholderText">
                    Ask a question above or click one of the verification preset buttons.
                </div>
                <div class="answer-text" id="answerText" style="display: none;"></div>
                <div class="sources-area" id="sourcesArea" style="display: none;">
                    <div class="sources-title">Verified Sources</div>
                    <div class="sources-list" id="sourcesList"></div>
                </div>
            </div>
        </section>

        <!-- Right Column: Upload & Ingestion -->
        <section class="glass-card">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="stroke: var(--primary); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Ingest Documents
            </h2>

            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="form-group">
                    <label class="form-label" for="projectSelect">Project Scope</label>
                    <select id="projectSelect" class="form-select" required>
                        <option value="">Select Project...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="docTitle">Document Name / Title</label>
                    <input type="text" id="docTitle" class="form-input" placeholder="e.g. Title Docs, Invoices" required>
                </div>

                <div class="dropzone-container" onclick="triggerFileSelect()">
                    <div class="dropzone-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="stroke: var(--primary); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                    </div>
                    <div class="dropzone-text" id="dropzoneText">
                        Drag and drop file here or <span>browse</span>
                    </div>
                    <input type="file" id="fileInput" class="hidden-file" onchange="fileSelected()">
                </div>

                <button type="submit" class="action-btn">Process & Index File</button>
            </form>

            <div class="doc-list" id="docList">
                <div class="preset-title">Active Knowledge Base Files</div>
                <!-- Document items will go here -->
            </div>
        </section>

        <!-- Tab Section: Metadata Inspector -->
        <section class="tab-section glass-card">
            <div class="tab-headers">
                <button class="tab-header active" onclick="switchTab(event, 'landParcelsTab')">Land Parcels</button>
                <button class="tab-header" onclick="switchTab(event, 'vendorsTab')">Vendors</button>
                <button class="tab-header" onclick="switchTab(event, 'meetingNotesTab')">Meeting Notes</button>
                <button class="tab-header" onclick="switchTab(event, 'projectsTab')">Projects / Entities</button>
            </div>

            <!-- Land Parcels Content -->
            <div id="landParcelsTab" class="tab-content active">
                <!-- Dynamically populated land parcels cards -->
            </div>

            <!-- Vendors Content -->
            <div id="vendorsTab" class="tab-content">
                <!-- Dynamically populated vendors cards -->
            </div>

            <!-- Meeting Notes Content -->
            <div id="meetingNotesTab" class="tab-content">
                <!-- Dynamically populated meeting notes -->
            </div>

            <!-- Projects Content -->
            <div id="projectsTab" class="tab-content">
                <!-- Dynamically populated projects list -->
            </div>
        </section>

    </div>

    <script>
        const API_URL = ""; // Relative path to FastAPI backend

        // Initialize lists and fetch data on load
        window.addEventListener('load', async () => {
            await refreshAllData();
        });

        async function refreshAllData() {
            await fetchProjects();
            await fetchLandParcels();
            await fetchVendors();
            await fetchMeetingNotes();
            await fetchDocuments();
        }

        // Project helpers
        async function fetchProjects() {
            try {
                const res = await fetch(`${API_URL}/api/projects`);
                const projects = await res.json();
                
                const selectEl = document.getElementById('projectSelect');
                selectEl.innerHTML = '<option value="">Select Project...</option>';
                
                const projTab = document.getElementById('projectsTab');
                projTab.innerHTML = '';

        // Ask preset helpers
        function askPreset(question) {
            document.getElementById('questionInput').value = question;
            submitQuestion();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                submitQuestion();
            }
        }

        // Submit Ask Q&A Query
        async function submitQuestion() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();
            if (!question) return;

            const placeholderText = document.getElementById('placeholderText');
            const answerText = document.getElementById('answerText');
            const sourcesArea = document.getElementById('sourcesArea');
            const sourcesList = document.getElementById('sourcesList');

            // Set loading state
            placeholderText.innerHTML = '<div class="spinner"></div><p style="margin-top: 1rem; color: var(--primary);">Querying Brain Layers...</p>';
            placeholderText.style.display = 'flex';
            answerText.style.display = 'none';
            sourcesArea.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/api/search/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await res.json();

                // Clear placeholder
                placeholderText.style.display = 'none';
                
                // Show Answer
                answerText.innerHTML = data.answer;
                answerText.style.display = 'block';

                // Render Sources
                sourcesList.innerHTML = '';
                if(data.sources && data.sources.length > 0) {
                    data.sources.forEach(src => {
                        // Check if source matches Zoho Books/CRM (mock APIs)
                        if (src.toLowerCase().includes('api') || src.toLowerCase().includes('interface') || src.toLowerCase().includes('tool')) {
                            sourcesList.innerHTML += `<span class="source-badge" style="border-color: rgba(158, 252, 208, 0.4); color: var(--primary);">${src}</span>`;
                        } else {
                            sourcesList.innerHTML += `<a href="${API_URL}/uploads/${src}" target="_blank" class="source-badge">${src}</a>`;
                        }
                    });
                    sourcesArea.style.display = 'block';
                }
            } catch(err) {
                placeholderText.innerHTML = `<span style="color: var(--accent-warning);">Error connecting to the Company Brain server.</span>`;
                console.error(err);
            }
        }

        // File drop/upload handlers
        function triggerFileSelect() {
            document.getElementById('fileInput').click();
        }

        function fileSelected() {
            const input = document.getElementById('fileInput');
            const dropzoneText = document.getElementById('dropzoneText');
            if (input.files.length > 0) {
                dropzoneText.innerHTML = `Selected: <strong>${input.files[0].name}</strong>`;
            }
        }

        async function handleUpload(e) {
            e.preventDefault();
            const projSelect = document.getElementById('projectSelect');
            const titleInput = document.getElementById('docTitle');
            const fileInput = document.getElementById('fileInput');

            if (!projSelect.value || !titleInput.value || fileInput.files.length === 0) {
                alert("Please fill all fields and select a file!");
                return;
            }

            const formData = new FormData();
            formData.append("project_id", projSelect.value);
            formData.append("title", titleInput.value);
            formData.append("file", fileInput.files[0]);

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = "Processing & Ingesting...";
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/api/documents/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                alert(data.message);
                
                // Clear fields
                titleInput.value = '';
                fileInput.value = '';
                document.getElementById('dropzoneText').innerHTML = 'Drag and drop file here or <span>browse</span>';
                
                // Refresh list
                await refreshAllData();
            } catch (err) {
                alert("Failed to upload document");
                console.error(err);
            } finally {
                submitBtn.textContent = originalBtnText;
                submitBtn.disabled = false;
            }
        }

        // Tab selection helper
        function switchTab(e, tabId) {
            // Remove active classes
            document.querySelectorAll('.tab-header').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Set active
            e.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
    </script>
