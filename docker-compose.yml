version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: company_brain_db
    restart: always
    environment:
      POSTGRES_DB: company_brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d company_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: company_brain_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/company_brain
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - .:/app

volumes:
  postgres_data:
